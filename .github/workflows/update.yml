name: Update dashboard

on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 06:00 JST
  workflow_dispatch: {}     # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Fetch patents
        env:
          PATENTSVIEW_API_KEY: ${{ secrets.PATENTSVIEW_API_KEY }}
        run: python scripts/fetch_patents.py

      - name: Analyze
        run: python scripts/analyze.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet || git commit -m "chore: daily dashboard update"
          git push
